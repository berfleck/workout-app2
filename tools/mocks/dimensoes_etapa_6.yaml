# Mocks das dimensões da Etapa 6 (família refinada + 5 dims core + 1 narrow-scope).
#
# Usado pelo harness `tools/calibrar_pesos_dimensoes.py` (Fase 3 / E.1).
# NÃO altera o XLSX. Loader sobrescreve `variacao_de` no Exercicio in-memory
# (origem=cadastrado) ou cria Exercicio in-memory (origem=mock_futuro) antes
# de chamar o gerador.
#
# Campos:
#   - origem: "cadastrado" → exercício existe no XLSX, overlay sobrescreve
#       campos de proximidade. APENAS `familia_estrita` afeta o gerador
#       atual (via `Exercicio.variacao_de`); outras dims ficam disponíveis
#       num dict separado pro stub `_penalty_proximidade` futuro.
#   - origem: "mock_futuro" → cadastro futuro da Etapa 6/7. Loader cria
#       Exercicio com defaults pros campos não-overlay (campo `extras`).
#
# Sources das decisões:
#   - Etapa 6 Sessão 1+2 — `docs/refatoracao/dimensoes_proximidade.md`
#   - Anexo de consertos itens 15-bis (Supino refinado), 15-quinquies
#     (subida_elevada), 15-septies (variante_pontual), 15-octies (ativo).

