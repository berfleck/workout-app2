<div class="mt-2 p-3 bg-green-50 border border-green-200 rounded-lg">
    <div class="text-xs font-semibold text-green-800 mb-1.5 flex items-center gap-1">
        <svg class="icon icon-xs"><use href="#i-check"/></svg> Publicado! Link pro aluno:
    </div>
    <div class="flex gap-1.5 items-center">
        <input type="text" value="{{ url }}" readonly id="pub-url-input"
               class="flex-1 min-w-0 text-xs px-2 py-1.5 border border-gray-300 rounded bg-white text-gray-700"
               onclick="this.select()">
        <button type="button" class="btn btn-primary shrink-0 text-xs"
                onclick="navigator.clipboard.writeText('{{ url }}'); this.querySelector('span').textContent='Copiado!';">
            <svg class="icon icon-xs"><use href="#i-copy"/></svg> <span>Copiar</span>
        </button>
        <a href="{{ url }}" target="_blank" rel="noopener" class="btn shrink-0 text-xs">Abrir</a>
    </div>
    <div class="text-[11px] text-gray-500 mt-1.5">Mande esse link no WhatsApp. Ao atualizar a rotina, publique de novo — o link continua o mesmo.</div>
</div>
