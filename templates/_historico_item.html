<div class="hist-card">
    <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
            <div class="hist-titulo">{{ reg.etiqueta }}</div>
            <div class="hist-meta">
                {{ reg.get('data', '—') }} · {{ reg.get('n_treinos', reg.get('sessoes', [])|length) }} treino(s)
                {% if not aluno_filtro %} · <span class="text-gray-600">{{ reg.get('aluno', '—') }}</span>{% endif %}
            </div>
        </div>
        <div class="flex gap-1 items-center shrink-0">
            <button class="btn-icon" title="Carregar para edição"
                    hx-post="/historico/{{ reg.id }}/carregar"
                    hx-target="#resultado"
                    onclick="showTab('treinos'); document.querySelector('.nav-tab:first-child').click()">↩</button>
            <button class="btn-icon text-red-400 hover:text-red-600" title="Apagar registro"
                    hx-delete="/historico/{{ reg.id }}/apagar"
                    hx-target="#tab-historico" hx-swap="innerHTML"
                    hx-confirm="Apagar este registro?">🗑</button>
        </div>
    </div>
    <details class="m-0 mt-1.5">
        <summary class="text-xs py-0.5 font-semibold text-gray-500 cursor-pointer">
            <span class="text-gray-400 text-[10px]">▶</span> Ver treinos
        </summary>
        <div hx-get="/historico/{{ reg.id }}/ver" hx-trigger="revealed" hx-swap="innerHTML" class="mt-2">
            <span class="spinner"></span> Carregando...
        </div>
    </details>
</div>
