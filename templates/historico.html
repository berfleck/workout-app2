<p class="text-xs font-semibold text-brand-500 uppercase tracking-widest mb-1">Registros salvos</p>
<h2 class="text-2xl md:text-3xl font-bold uppercase tracking-wide leading-tight text-gray-900 mb-3">Histórico de treinos</h2>

<!-- Filtros -->
<div class="flex gap-2 mb-4 items-end flex-wrap">
    <div class="flex-1 min-w-[140px]">
        <label class="text-[11px] text-gray-500 font-medium block mb-0.5">Aluno / Turma</label>
        <select name="aluno" class="input-field text-sm w-full"
                hx-get="/historico" hx-target="#historico-content" hx-swap="innerHTML"
                hx-include="[name='busca']"
                hx-vals='{"partial":"0"}'>
            <option value="">Todos</option>
            {% for a in alunos_historico %}
            <option value="{{ a }}" {% if a == aluno_filtro %}selected{% endif %}>{{ a }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="flex-1 min-w-[140px]">
        <label class="text-[11px] text-gray-500 font-medium block mb-0.5">Buscar etiqueta</label>
        <input type="search" name="busca" value="{{ busca }}" placeholder="Ex: Semana 1..."
               class="input-field text-sm w-full"
               hx-get="/historico" hx-target="#historico-content" hx-swap="innerHTML"
               hx-trigger="input changed delay:300ms, search"
               hx-include="[name='aluno']">
    </div>
</div>

<!-- Lista de registros -->
<div id="hist-lista">
    {% include '_historico_lista.html' %}
</div>
