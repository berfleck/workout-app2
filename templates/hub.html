{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto">
    <!-- Header -->
    <div class="mb-3">
        <p class="text-xs font-semibold text-brand-500 uppercase tracking-widest mb-1">Painel principal</p>
        <h2 class="text-2xl md:text-3xl font-bold uppercase tracking-wide leading-tight text-gray-900">Gerenciamento das rotinas de treino</h2>
    </div>

    <!-- Seletor de aluno (compacto) -->
    <div class="mb-4">
        <select id="sel-aluno-hub" name="aluno_id"
                class="input-field text-sm font-medium w-full sm:w-auto sm:min-w-[220px] sm:max-w-[300px]"
                hx-get="/hub/rotina" hx-target="#rotina-display" hx-swap="innerHTML"
                hx-include="this">
            <option value="">Selecione um aluno ou turma...</option>
            {% for a in alunos %}
            <option value="{{ a.id }}" {% if selected_aluno_id == a.id %}selected{% endif %}>{{ a.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Área da rotina -->
    <div id="rotina-display">
        <div class="text-center py-16 text-gray-400">
            <svg class="icon mb-4 mx-auto text-gray-300" style="width:48px;height:48px"><use href="#i-dumbbell"/></svg>
            <div class="text-lg font-semibold text-gray-700">Selecione um aluno para começar</div>
            <div class="text-sm mt-2">Escolha um aluno no seletor acima para ver sua rotina atual</div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function hubTogglePeriodo(periodo) {
    const alunoId = document.getElementById('sel-aluno-hub').value;
    if (!alunoId) return;
    htmx.ajax('GET', `/hub/rotina?aluno_id=${alunoId}&periodo=${periodo}`, {
        target: '#rotina-display',
        swap: 'innerHTML'
    });
}

// Auto-trigger on load if aluno is pre-selected
document.addEventListener('DOMContentLoaded', function() {
    const sel = document.getElementById('sel-aluno-hub');
    if (sel.value) {
        sel.dispatchEvent(new Event('change'));
    }
});
</script>
{% endblock %}
